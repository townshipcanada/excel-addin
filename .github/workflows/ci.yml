name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate manifest
        run: |
          if [ -f "package.json" ]; then
            npm ci
            npm run build --if-present
            npm test --if-present
          fi
          echo "Manifest validation: checking manifest.xml exists"
          test -f manifest.xml && echo "manifest.xml found" || echo "No manifest.xml"
